apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  name: cronhub
spec:
  selector:
    matchLabels:
      app: cronhub
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 3
  template:
    metadata:
      labels:
        app: cronhub
    spec:
      imagePullSecrets:
        - name: docker-reg-cred

      containers:
        - name: cronhub
          image: msolutiongroup/cronhub:<IMAGE-TAG>
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              memory: "1Gi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "400m"

          envFrom:
            - secretRef:
                name: cronhub-env

          volumeMounts:
            - name: cronhub-data
              mountPath: /app/data

      volumes:
        - name: cronhub-data
          persistentVolumeClaim:
            claimName: cronhub-data-pvc

       
---
apiVersion: v1
kind: Service
metadata:
  name: cronhub
  labels:
    app: cronhub
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: cronhub

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cronhub-data-pvc
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

